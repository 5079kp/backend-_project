<!DOCTYPE html>
<html lang="en">
<head>
  <title>🔥 Contact | MyServer</title>
  <link rel="stylesheet" href="style.css">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>


<div class="bg-glow"></div>

<nav class="nav">
  <div class="logo">
    <i class="fa-solid fa-bolt"></i>
    <span>MyServer</span>
  </div>

  <div class="links">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <button class="dash-btn" onclick="goReact()">Dashboard</button>
  </div>
</nav>


<section class="contact-hero">
  <h1 class="title">Let’s Connect</h1>
  <p class="subtitle">
    Have a project in mind? Send a message and let’s build something amazing 🚀
  </p>
</section>


<section class="contact-wrap">
  <div class="contact-info">
    <h2>Contact Info</h2>
    <p><i class="fa-solid fa-envelope"></i> kp@myserver.com</p>
    <p><i class="fa-solid fa-phone"></i> +91 8141629901</p>
    <p><i class="fa-solid fa-location-dot"></i> India</p>

    <div class="socials">
      <i class="fa-brands fa-github"></i>
      <i class="fa-brands fa-linkedin"></i>
      <i class="fa-brands fa-twitter"></i>
    </div>
  </div>

  <form class="contact-form" onsubmit="submitForm(event)">
    <h2>Send Message</h2>

    <div class="field">
      <i class="fa-solid fa-user"></i>
      <input type="text" placeholder="Your Name" required>
    </div>

    <div class="field">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" placeholder="Your Email" required>
    </div>

    <div class="field">
      <i class="fa-solid fa-message"></i>
      <textarea placeholder="Your Message" rows="4" required></textarea>
    </div>

    <button type="submit" class="send-btn">
      <i class="fa-solid fa-paper-plane"></i> Send Message
    </button>

    <p class="success"> Message sent successfully!</p>
  </form>
</section>

<script src="gsap.js"></script>
</body>
</html>
